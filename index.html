<style>
/* ============================================================
   CTA — Claude Track Agent · Design System
   Global stylesheet entry point. Consumers link THIS file.
   Keep this file as @import lines only.
   ============================================================ */



/* ============================================================
   CTA — Color tokens
   Dark "security console" palette. Deep navy/charcoal base,
   electric-blue brand accent, signal-green live/healthy status,
   red→amber→slate threat-severity scale.
   All foreground/background pairings target WCAG AA.
   ============================================================ */

:root {
  /* ---- Base surfaces (dark, deepest → raised) ---- */
  --bg-base:        #07090F; /* page void / behind everything */
  --bg-canvas:      #0A0E16; /* default page background */
  --surface-1:      #10151F; /* cards, panels */
  --surface-2:      #161D29; /* raised: inputs, table rows */
  --surface-3:      #1E2735; /* hover / active fills */
  --surface-inset:  #0C111A; /* wells, code blocks, terminals */

  /* ---- Borders / hairlines ---- */
  --border:         #212A39; /* default hairline */
  --border-strong:  #2E3A4E; /* emphasized divider */
  --border-faint:   #18202C; /* barely-there separator */

  /* ---- Text ---- */
  --text-primary:   #E9EDF4; /* headings, primary copy */
  --text-secondary: #A2AEC1; /* body, supporting */
  --text-tertiary:  #6B7689; /* captions, metadata */
  --text-disabled:  #475063; /* disabled / placeholder */
  --text-on-accent: #06101F; /* text sitting on a filled accent */

  /* ---- Brand accent: electric blue ---- */
  --accent:         #3D7BFF; /* primary brand / CTA / links */
  --accent-bright:  #6398FF; /* hover / focus emphasis */
  --accent-press:   #2E63D9; /* pressed */
  --accent-soft:    rgba(61, 123, 255, 0.14);  /* tint fill */
  --accent-soft-2:  rgba(61, 123, 255, 0.24);  /* tint border */
  --accent-glow:    rgba(61, 123, 255, 0.40);  /* focus ring / glow */

  /* ---- Signal green: live / healthy / monitoring ---- */
  --signal:         #2FD27A; /* "live", healthy, success */
  --signal-bright:  #57E29A;
  --signal-soft:    rgba(47, 210, 122, 0.14);
  --signal-glow:    rgba(47, 210, 122, 0.40);

  /* ---- Threat severity scale ---- */
  --sev-high:       #FF5C5C; /* HIGH / critical / danger */
  --sev-high-soft:  rgba(255, 92, 92, 0.14);
  --sev-med:        #F6A724; /* MEDIUM / warning */
  --sev-med-soft:   rgba(246, 167, 36, 0.14);
  --sev-low:        #58A6FF; /* LOW / informational */
  --sev-low-soft:   rgba(88, 166, 255, 0.14);

  /* ---- Data-flow / chart support hues ---- */
  --data-cyan:      #35D6E7;
  --data-violet:    #9A86FF;
  --data-teal:      #2BB6A8;

  /* ---- Semantic aliases (use these in components) ---- */
  --color-bg:            var(--bg-canvas);
  --color-surface:       var(--surface-1);
  --color-surface-raised:var(--surface-2);
  --color-link:          var(--accent);
  --color-focus-ring:    var(--accent-glow);
  --color-success:       var(--signal);
  --color-danger:        var(--sev-high);
  --color-warning:       var(--sev-med);
  --color-info:          var(--sev-low);
}

/* ============================================================
   CTA — Typography tokens
   Space Grotesk (display) · IBM Plex Sans (prose/UI) · JetBrains Mono (data)
   Type scale is a ~1.25 modular scale tuned for dense console UIs.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-display: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
  --font-sans:    'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ---- Weights ---- */
  --fw-regular:  400; /* @kind font */
  --fw-medium:   500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold:     700; /* @kind font */

  /* ---- Font sizes (rem, 16px base) ---- */
  --fs-3xs:  0.6875rem; /* 11px — micro labels, badge text */
  --fs-2xs:  0.75rem;   /* 12px — table meta, captions */
  --fs-xs:   0.8125rem; /* 13px — dense UI, code */
  --fs-sm:   0.875rem;  /* 14px — secondary body, controls */
  --fs-base: 1rem;      /* 16px — body */
  --fs-md:   1.125rem;  /* 18px — lead paragraph */
  --fs-lg:   1.375rem;  /* 22px — card titles */
  --fs-xl:   1.75rem;   /* 28px — section sub-heads */
  --fs-2xl:  2.25rem;   /* 36px — section heads */
  --fs-3xl:  3rem;      /* 48px — page heads */
  --fs-4xl:  3.75rem;   /* 60px — hero */
  --fs-5xl:  4.5rem;    /* 72px — hero XL */

  /* ---- Line heights ---- */
  --lh-tight:   1.05;  /* @kind font */
  --lh-snug:    1.2;   /* @kind font */
  --lh-normal:  1.5;   /* @kind font */
  --lh-relaxed: 1.65;  /* @kind font */
  --lh-mono:    1.55;  /* @kind font */

  /* ---- Letter spacing ---- */
  --ls-tighter: -0.03em; /* @kind font */
  --ls-tight:   -0.015em;/* @kind font */
  --ls-normal:  0;       /* @kind font */
  --ls-wide:    0.04em;  /* @kind font */
  --ls-wider:   0.12em;  /* @kind font */

  /* ---- Semantic roles ---- */
  --text-hero:        var(--fw-bold) var(--fs-4xl)/var(--lh-tight) var(--font-display);
  --text-h1:          var(--fw-bold) var(--fs-3xl)/var(--lh-snug) var(--font-display);
  --text-h2:          var(--fw-semibold) var(--fs-2xl)/var(--lh-snug) var(--font-display);
  --text-h3:          var(--fw-semibold) var(--fs-xl)/var(--lh-snug) var(--font-display);
  --text-card-title:  var(--fw-semibold) var(--fs-lg)/var(--lh-snug) var(--font-display);
  --text-lead:        var(--fw-regular) var(--fs-md)/var(--lh-relaxed) var(--font-sans);
  --text-body:        var(--fw-regular) var(--fs-base)/var(--lh-normal) var(--font-sans);
  --text-body-sm:     var(--fw-regular) var(--fs-sm)/var(--lh-normal) var(--font-sans);
  --text-mono:        var(--fw-regular) var(--fs-xs)/var(--lh-mono) var(--font-mono);
  --text-metric:      var(--fw-semibold) var(--fs-3xl)/var(--lh-tight) var(--font-mono);
}

/* ---- Eyebrow / kicker helper (used across marketing sections) ---- */
.cta-kicker {
  font-family: var(--font-mono);
  font-size: var(--fs-2xs);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-wider);
  text-transform: uppercase;
  color: var(--accent);
}

/* ============================================================
   CTA — Spacing, radius, shadow, layout tokens
   8px base grid with 4px half-steps for dense console UIs.
   ============================================================ */

:root {
  /* ---- Spacing scale (4 / 8px grid) ---- */
  --space-0:   0;
  --space-1:   0.25rem;  /* 4  */
  --space-2:   0.5rem;   /* 8  */
  --space-3:   0.75rem;  /* 12 */
  --space-4:   1rem;     /* 16 */
  --space-5:   1.5rem;   /* 24 */
  --space-6:   2rem;     /* 32 */
  --space-7:   2.5rem;   /* 40 */
  --space-8:   3rem;     /* 48 */
  --space-9:   4rem;     /* 64 */
  --space-10:  5rem;     /* 80 */
  --space-12:  6rem;     /* 96 */
  --space-16:  8rem;     /* 128 — section rhythm */

  /* ---- Radius ---- */
  --radius-xs:  3px;   /* badges, chips */
  --radius-sm:  6px;   /* inputs, buttons */
  --radius-md:  10px;  /* cards */
  --radius-lg:  14px;  /* panels, dashboard surfaces */
  --radius-xl:  20px;  /* hero / feature wells */
  --radius-pill:999px;
  --radius-round:50%;

  /* ---- Borders ---- */
  --border-width: 1px;        /* @kind other */
  --border-width-thick: 1.5px;/* @kind other */

  /* ---- Elevation / shadows (tuned for dark surfaces) ---- */
  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.40);
  --shadow-sm:  0 2px 8px rgba(0, 0, 0, 0.45);
  --shadow-md:  0 8px 24px rgba(0, 0, 0, 0.50);
  --shadow-lg:  0 18px 48px rgba(0, 0, 0, 0.55);
  --shadow-accent: 0 0 0 1px var(--accent-soft-2), 0 8px 30px rgba(61, 123, 255, 0.22);
  --shadow-signal: 0 0 0 1px var(--signal-soft), 0 8px 30px rgba(47, 210, 122, 0.20);
  /* inner top highlight for raised console surfaces */
  --bevel-top: inset 0 1px 0 rgba(255, 255, 255, 0.04); /* @kind shadow */

  /* ---- Focus ring ---- */
  --focus-ring: 0 0 0 3px var(--accent-glow);

  /* ---- Layout ---- */
  --maxw-prose:    68ch;
  --maxw-content:  1120px;
  --maxw-wide:     1320px;
  --nav-height:    64px;
  --gutter:        var(--space-5);
}

/* ============================================================
   CTA — Motion tokens
   Restrained, instrumental motion. No bounce, no overshoot.
   Things appear, flow, and count. Easing favors crisp deceleration.
   ============================================================ */

:root {
  /* ---- Duration ---- */
  --dur-instant: 80ms;   /* @kind other */
  --dur-fast:    140ms;  /* @kind other */
  --dur-base:    220ms;  /* @kind other */
  --dur-slow:    360ms;  /* @kind other */
  --dur-feed:    600ms;  /* @kind other */
  --dur-flow:    2400ms; /* @kind other */

  /* ---- Easing ---- */
  --ease-standard: cubic-bezier(0.2, 0, 0.1, 1);   /* @kind other */
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);  /* @kind other */
  --ease-in:       cubic-bezier(0.5, 0, 0.9, 0.2); /* @kind other */
  --ease-linear:   linear;                          /* @kind other */

  /* ---- Common transitions ---- */
  --t-color:   color var(--dur-fast) var(--ease-standard),
               background-color var(--dur-fast) var(--ease-standard),
               border-color var(--dur-fast) var(--ease-standard); /* @kind other */
  --t-transform: transform var(--dur-base) var(--ease-out); /* @kind other */
  --t-all:     all var(--dur-base) var(--ease-standard); /* @kind other */
}

/* ---- Shared keyframes used across components & UI kit ---- */
@keyframes cta-pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}
@keyframes cta-blink {
  0%, 49%  { opacity: 1; }
  50%, 100%{ opacity: 0; }
}
@keyframes cta-flow-dash {
  to { stroke-dashoffset: -200; }
}
@keyframes cta-row-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cta-toast-in {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes cta-ring {
  0%   { box-shadow: 0 0 0 0 var(--signal-glow); }
  100% { box-shadow: 0 0 0 8px rgba(47, 210, 122, 0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

/* ============================================================
   CTA — Base / reset
   Minimal, opinionated reset for the dark console aesthetic.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--bg-canvas);
  color: var(--text-primary);
  font: var(--text-body);
  font-feature-settings: 'cv05' 1, 'ss01' 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4 {
  margin: 0;
  font-family: var(--font-display);
  color: var(--text-primary);
  letter-spacing: var(--ls-tight);
}

p { margin: 0; }

a {
  color: var(--color-link);
  text-decoration: none;
  transition: var(--t-color);
}
a:hover { color: var(--accent-bright); }

code, pre, kbd, samp { font-family: var(--font-mono); }

::selection { background: var(--accent-soft-2); color: var(--text-primary); }

:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--radius-sm);
}

/* Thin console scrollbars on scrolling regions */
.cta-scroll { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
.cta-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.cta-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
.cta-scroll::-webkit-scrollbar-track { background: transparent; }



  html { scroll-behavior: smooth; }
  body { background: var(--bg-canvas); }
  a { color: inherit; }
  mark { background: transparent; }

  /* Never let the page scroll sideways on small screens */
  html, body { max-width: 100%; overflow-x: hidden; }
  #root { overflow-x: hidden; }
  img, svg, video, canvas { max-width: 100%; }

  /* Responsive collapse */
  @media (max-width: 1080px) {
    .cta-4col { grid-template-columns: repeat(2, 1fr) !important; }
    .cta-5col { grid-template-columns: repeat(3, 1fr) !important; }
    .cta-2col { grid-template-columns: 1fr !important; }
    .cta-statgrid { grid-template-columns: repeat(2, 1fr) !important; }
    .cta-sec-left { border-right: none !important; border-bottom: 1px solid var(--border) !important; }
    .cta-navlinks { display: none !important; }
  }
  @media (max-width: 860px) {
    .cta-hero-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
    .cta-3col { grid-template-columns: 1fr !important; }
    .cta-steps { grid-template-columns: repeat(2, 1fr) !important; gap: 28px 0 !important; }
    .cta-foot { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    /* Roomier touch targets + smaller section rhythm on tablets/phones */
    .cta-section { padding: 64px 0 !important; }
  }
  @media (max-width: 560px) {
    .cta-4col, .cta-5col, .cta-statgrid, .cta-steps, .cta-foot { grid-template-columns: 1fr !important; }
    .cta-steps > div { border-left: none !important; padding-left: 0 !important; }
    .cta-foot { grid-template-columns: 1fr !important; }
    /* Tighter page gutters so cards aren't squeezed */
    .cta-container { padding-left: 16px !important; padding-right: 16px !important; }
    .cta-section { padding: 48px 0 !important; }
    /* Hide the secondary nav button so the brand + primary CTA fit one row */
    .cta-nav-ghost { display: none !important; }
    /* Let the dense endpoints table scroll horizontally instead of crushing */
    .cta-wide-table { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
    .cta-wide-table > div { min-width: 540px; }
    .cta-demo-chrome { flex-wrap: wrap !important; row-gap: 8px; }
  }
</style>

        SeverityTag: DSSeverity, RiskScore: DSRisk, LiveDot: DSLive } = DASH;

// ---- 24h activity area chart ----
function ActivityChart({ data }) {
  const w = 560, h = 160, pad = 6;
  const max = Math.max(...data);
  const step = (w - pad * 2) / (data.length - 1);
  const pts = data.map((v, i) => [pad + i * step, h - pad - (v / max) * (h - pad * 2 - 14)]);
  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length - 1][0]} ${h} L${pts[0][0]} ${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: 160, display: 'block' }}>
      <defs>
        <linearGradient id="ctaArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.34" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((g) => (
        <line key={g} x1="0" x2={w} y1={h * g} y2={h * g} stroke="var(--border-faint)" strokeWidth="1" />
      ))}
      <path d={area} fill="url(#ctaArea)" />
      <path d={line} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {pts.filter((_, i) => i % 4 === 0).map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="var(--bg-canvas)" stroke="var(--accent)" strokeWidth="1.5" />
      ))}
    </svg>
  );
}

// ---- severity donut ----
function Donut({ mix }) {
  const total = mix.reduce((a, b) => a + b.value, 0);
  const r = 52, c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
      <svg width="132" height="132" viewBox="0 0 132 132" style={{ flexShrink: 0 }}>
        <circle cx="66" cy="66" r={r} fill="none" stroke="var(--surface-3)" strokeWidth="14" />
        {mix.map((m) => {
          const frac = m.value / total;
          const dash = `${frac * c} ${c}`;
          const el = (
            <circle key={m.level} cx="66" cy="66" r={r} fill="none" stroke={m.color} strokeWidth="14"
              strokeDasharray={dash} strokeDashoffset={-offset * c} transform="rotate(-90 66 66)" strokeLinecap="butt" />
          );
          offset += frac;
          return el;
        })}
        <text x="66" y="62" textAnchor="middle" fill="var(--text-primary)" style={{ font: 'var(--fw-bold) 26px var(--font-mono)' }}>{total}</text>
        <text x="66" y="80" textAnchor="middle" fill="var(--text-tertiary)" style={{ font: '10px var(--font-mono)', letterSpacing: '1px' }}>FLAGGED</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {mix.map((m) => (
          <div key={m.level} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: m.color }} />
            <span style={{ font: 'var(--text-body-sm)', color: 'var(--text-secondary)', minWidth: 56 }}>{m.label}</span>
            <span style={{ font: 'var(--text-mono)', fontSize: 'var(--fs-xs)', color: 'var(--text-primary)', fontWeight: 'var(--fw-semibold)' }}>{m.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- Threat Hunt tab ----
function HuntTab() {
  const d = window.CTA_DATA;
  const [q, setQ] = React.useState('credentials');
  const terms = q.trim().toLowerCase();
  const highlight = (text) => {
    if (!terms) return text;
    try {
      const parts = text.split(new RegExp(`(${terms.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'ig'));
      return parts.map((p, i) => p.toLowerCase() === terms
        ? <mark key={i} style={{ background: 'var(--accent-soft-2)', color: 'var(--accent-bright)', borderRadius: 3, padding: '0 2px' }}>{p}</mark>
        : <React.Fragment key={i}>{p}</React.Fragment>);
    } catch { return text; }
  };
  const matches = terms ? d.huntCorpus.filter((r) => r.text.toLowerCase().includes(terms)) : d.huntCorpus;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <DSInput value={q} onChange={(e) => setQ(e.target.value)} mono size="lg" iconLeft={<window.IconSearch size={16} />}

      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {['credentials', 'aws', 'ignore previous', 'card', 'DLP'].map((s) => (
          <button key={s} onClick={() => setQ(s)} style={{ padding: '4px 10px', borderRadius: 'var(--radius-pill)', cursor: 'pointer',
            font: 'var(--text-mono)', fontSize: 'var(--fs-3xs)', background: 'var(--surface-2)', color: 'var(--text-tertiary)',
            border: '1px solid var(--border)' }}>{s}</button>
        ))}
        <span style={{ marginLeft: 'auto', font: 'var(--text-mono)', fontSize: 'var(--fs-2xs)', color: 'var(--text-tertiary)' }}>{matches.length} / {d.huntCorpus.length} prompts</span>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {matches.map((r) => (
          <DSCard key={r.id} variant="inset" padding="12px 14px" style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>

        )}

    </div>
  );
}

  const idRef = React.useRef(100);

  React.useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) return;
    let i = 0;
    const t = setInterval(() => {
      const tmpl = d.incoming[i % d.incoming.length];
      i++;
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      const ev = { ...tmpl, id: 'live-' + (idRef.current++), time, _new: true };
      setFeed((prev) => [ev, ...prev].slice(0, 30));
      if (ev.severity === 'high') {
        const toast = { ...ev };
        setToasts((prev) => [toast, ...prev].slice(0, 3));
        setTimeout(() => setToasts((prev) => prev.filter((x) => x.id !== toast.id)), 4600);
      }
    }, 3200);
    return () => clearInterval(t);
  }, []);

  const tabs = [
    { id: 'overview', label: 'Overview', icon: <window.IconActivity size={15} /> },
    { id: 'endpoints', label: 'Endpoints', count: d.stats.endpoints, icon: <window.IconServer size={15} /> },
